name: Build nRF52 Probe Firmware

on:
  push:
    branches:
      - main
    paths:
      - .github/docker/nrf5-sdk/**
      - .github/workflows/build-nrf52-probe.yml
      - fw/nrf52/ble_peripheral/**
  pull_request:
    branches:
      - main
    paths:
      - .github/docker/nrf5-sdk/**
      - .github/workflows/build-nrf52-probe.yml
      - fw/nrf52/ble_peripheral/**

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NRF5_SDK_IMAGE: ghcr.io/cedrichirschi/wulpus/nrf5-sdk:17.1.0-newlib
  NRF5_SDK_ROOT: /opt/nrf5-sdk
  PROJECT_RELATIVE_PATH: examples/ble_peripheral/US_probe_nRF52_firmware
  BUILD_DIR: examples/ble_peripheral/US_probe_nRF52_firmware/pca10040/s132/armgcc

jobs:
  ensure-nrf5-sdk-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: image
        name: Check nRF5 SDK image
        run: |
          if docker manifest inspect "$NRF5_SDK_IMAGE" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push nRF5 SDK image
        if: steps.image.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .github/docker/nrf5-sdk
          push: true
          tags: ${{ env.NRF5_SDK_IMAGE }}

  build:
    runs-on: ubuntu-latest
    needs: ensure-nrf5-sdk-image
    strategy:
      fail-fast: false
      matrix:
        probe_name:
          - WULPUS_PROBE_0
          - WULPUS_PROBE_1
          - WULPUS_PROBE_2
          - WULPUS_PROBE_3
          - WULPUS_PROBE_4
          - WULPUS_PROBE_5
          - WULPUS_PROBE_6
          - WULPUS_PROBE_7
          - WULPUS_PROBE_8
          - WULPUS_PROBE_9
    container:
      image: ghcr.io/cedrichirschi/wulpus/nrf5-sdk:17.1.0-newlib
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v5

      - name: Copy project into SDK
        run: |
          rm -rf "$NRF5_SDK_ROOT/$PROJECT_RELATIVE_PATH"
          mkdir -p "$NRF5_SDK_ROOT/examples/ble_peripheral"
          cp -a fw/nrf52/ble_peripheral/US_probe_nRF52_firmware \
            "$NRF5_SDK_ROOT/$PROJECT_RELATIVE_PATH"

      - name: Build probe firmware
        working-directory: ${{ env.NRF5_SDK_ROOT }}/${{ env.BUILD_DIR }}
        run: |
          make -j"$(nproc)" GNU_INSTALL_ROOT=/usr/bin/ GNU_PREFIX=arm-none-eabi BLE_PROBE_NAME=${{ matrix.probe_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: nrf52_probe_firmware_${{ matrix.probe_name }}
          path: ${{ env.NRF5_SDK_ROOT }}/${{ env.BUILD_DIR }}/_build/nrf52832_xxaa.hex
