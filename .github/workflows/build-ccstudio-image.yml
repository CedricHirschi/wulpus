name: Build CCS Docker Image

on:
    workflow_dispatch:
    push:
      paths:
        - .github/docker/ccstudio-msp430/Dockerfile

permissions:
    contents: read
    packages: write

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    CCS_VERSION: 20.5.1.00012
    CCS_IMAGE: ghcr.io/cedrichirschi/wulpus/ccstudio-msp430:20.5.1.00012

jobs:
    image:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v5

        - uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - uses: docker/build-push-action@v6
          with:
            context: .github/docker/ccstudio-msp430
            push: true
            tags: ${{ env.CCS_IMAGE }}
            build-args: |
              CCS_VERSION=${{ env.CCS_VERSION }}
