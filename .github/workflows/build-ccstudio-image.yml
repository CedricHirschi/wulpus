name: Build CCS Docker Image

on:
    workflow_dispatch:
    push:
      paths:
        - .github/docker/ccstudio-msp430/Dockerfile

permissions:
    contents: read
    packages: write

jobs:
    image:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v5

        - uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - uses: docker/build-push-action@v6
          with:
            context: .github/docker/ccstudio-msp430
            push: true
            tags: ghcr.io/${{ github.repository }}/ccstudio-msp430:20.5.1.00012