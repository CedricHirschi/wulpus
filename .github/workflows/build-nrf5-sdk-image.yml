name: Build nRF5 SDK Docker Image

on:
  workflow_dispatch:
  push:
    paths:
      - .github/docker/nrf5-sdk/Dockerfile

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NRF5_SDK_ARCHIVE: nRF5_SDK_17.1.0_ddde560
  NRF5_SDK_IMAGE: ghcr.io/cedrichirschi/wulpus/nrf5-sdk:17.1.0-newlib

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .github/docker/nrf5-sdk
          push: true
          tags: ${{ env.NRF5_SDK_IMAGE }}
          build-args: |
            NRF5_SDK_ARCHIVE=${{ env.NRF5_SDK_ARCHIVE }}
